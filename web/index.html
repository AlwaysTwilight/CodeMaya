<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Codemaya RAG</title>
    <meta http-equiv="refresh" content="0; url=/login.html" />
  </head>
  <body>
    <div class="topbar">
      <div class="topbar-inner">
        <div class="brand">Codemaya RAG</div>
        <div class="nav">
          <a class="pill active" href="/">Chat</a>
          <a class="pill" href="/inject.html">Inject Docs</a>
          <span class="pill" id="authState">Logged out</span>
        </div>
      </div>
    </div>

    <div class="container">
      <div class="grid">
        <div class="card">
          <h3>Account</h3>
          <div class="muted">JWT auth. Rate limit: 10 messages/min per user.</div>
          <div class="kpi" id="kpi"></div>

          <hr style="border:0;border-top:1px solid var(--border);margin:12px 0" />

          <form id="loginForm">
            <h3 style="margin-top:0">Login</h3>
            <label>Email</label>
            <input id="loginEmail" type="email" placeholder="you@example.com" required />
            <label>Password</label>
            <input id="loginPassword" type="password" placeholder="••••••••" required />
            <div style="margin-top:10px" class="row">
              <button class="primary" type="submit">Login</button>
              <button class="danger" id="logoutBtn" type="button">Logout</button>
            </div>
          </form>

          <hr style="border:0;border-top:1px solid var(--border);margin:12px 0" />

          <form id="signupForm">
            <h3 style="margin-top:0">Sign up</h3>
            <label>Email</label>
            <input id="signupEmail" type="email" placeholder="you@example.com" required />
            <label>Password (min 8 chars)</label>
            <input id="signupPassword" type="password" placeholder="••••••••" required />
            <div style="margin-top:10px">
              <button class="primary" type="submit">Create account</button>
            </div>
          </form>

          <div id="authFlash" class="flash"></div>

          <hr style="border:0;border-top:1px solid var(--border);margin:12px 0" />
          <button id="historyBtn" type="button">Load last 10 Q&A</button>
          <div id="history" style="margin-top:10px"></div>
        </div>

        <div class="card chat">
          <h2 style="margin:0 0 8px 0">Chat</h2>
          <div class="muted">Answers are grounded to retrieved chunks from Chroma.</div>
          <div id="messages" class="messages" style="margin-top:10px">
            <div class="msg assistant">Login, then ask a question. If it’s not in the DB, it will refuse.</div>
          </div>
          <form id="chatForm" class="composer">
            <textarea id="chatInput" placeholder="Ask about your documents..."></textarea>
            <button id="sendBtn" class="primary" type="submit" style="flex:0 0 120px">Send</button>
          </form>
          <div id="chatFlash" class="flash"></div>
        </div>
      </div>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
